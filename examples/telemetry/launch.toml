# glu launch configuration for the telemetry example
#
# Run with:   glu launch -f examples/telemetry/launch.toml
# Then check: glu ps          (list running nodes)
#             glu list        (list active topics)
#             glu info /telemetry  (inspect topic details)

[[node]]
name = "sensor"
bin  = "zig-out/bin/glu-telemetry-sensor"

[[node]]
name = "controller"
bin  = "zig-out/bin/glu-telemetry-controller"

[[node]]
name = "monitor"
bin  = "zig-out/bin/glu-telemetry-monitor"
