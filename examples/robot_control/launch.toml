# glu launch configuration for the robot_control example
#
# Showcases: pub/sub feedback loop + UDP telemetry bridge
#
# Topics:
#   /cmd_vel   — velocity commands  (Twist,  50 Hz)
#   /odom      — robot odometry     (Odom,  100 Hz)
#   /battery   — battery status     (BatteryStat, 1 Hz)
#
# Run with:   glu launch -f examples/robot_control/launch.toml

[[node]]
name = "cmd_publisher"
bin  = "zig-out/bin/glu-robot-cmd"

[[node]]
name = "robot_sim"
bin  = "zig-out/bin/glu-robot-sim"

[[node]]
name = "telemetry_bridge"
bin  = "zig-out/bin/glu-robot-bridge"
