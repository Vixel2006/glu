# glu launch configuration for the pipeline example
#
# Showcases a multi-topic processing pipeline:
#   imu_sensor -> filter -> actuator
#
# Run with:   glu launch -f examples/pipeline/launch.toml
# Then check: glu list             (see all 3 active topics)
#             glu info /imu_raw       (inspect raw IMU topic)
#             glu info /imu_filtered
#             glu info /motors_cmd

[[node]]
name = "imu_sensor"
bin  = "zig-out/bin/glu-pipeline-imu-sensor"

[[node]]
name = "filter"
bin  = "zig-out/bin/glu-pipeline-filter"

[[node]]
name = "actuator"
bin  = "zig-out/bin/glu-pipeline-actuator"
